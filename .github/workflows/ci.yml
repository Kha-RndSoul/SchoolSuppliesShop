name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4          # Fix: v3 → v4

      - name: Setup Java
        uses: actions/setup-java@v4        # Fix: v3 → v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Chạy test và tạo báo cáo Coverage
        run: mvn test jacoco:report        # Fix: thêm jacoco:report

      - name: Kiểm tra file coverage tồn tại
        run: |
          if [ ! -f target/site/jacoco/jacoco.xml ]; then
            echo "❌ jacoco.xml không tồn tại!"
            echo "Các file xml hiện có:"
            find . -name "*.xml" | grep -i jacoco || echo "Không tìm thấy file jacoco nào"
            exit 1
          fi
          echo "✅ Tìm thấy jacoco.xml"

      - name: Upload Coverage lên Qlty Cloud
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: target/site/jacoco/jacoco.xml